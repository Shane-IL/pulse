<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse Todo</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f5f5;
        color: #333;
        display: flex;
        justify-content: center;
        padding: 40px 16px;
      }

      #app {
        width: 100%;
        max-width: 480px;
      }

      h1 {
        font-size: 2rem;
        font-weight: 300;
        text-align: center;
        color: #b83f45;
        margin-bottom: 24px;
      }

      .todo-app {
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        overflow: hidden;
      }

      /* Add todo form */
      .add-todo {
        display: flex;
        border-bottom: 1px solid #eee;
      }

      .add-todo input {
        flex: 1;
        padding: 14px 16px;
        font-size: 16px;
        border: none;
        outline: none;
        background: transparent;
      }

      .add-todo input::placeholder { color: #ccc; }

      .add-todo button {
        padding: 14px 20px;
        background: #b83f45;
        color: #fff;
        border: none;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }

      .add-todo button:hover { background: #a33539; }

      /* Todo list */
      .todo-list {
        list-style: none;
      }

      .todo-item {
        display: flex;
        align-items: center;
        padding: 12px 16px;
        border-bottom: 1px solid #f0f0f0;
        transition: background 0.1s;
      }

      .todo-item:hover { background: #fafafa; }

      .todo-item input[type="checkbox"] {
        width: 20px;
        height: 20px;
        margin-right: 12px;
        cursor: pointer;
        accent-color: #b83f45;
      }

      .todo-item span {
        flex: 1;
        font-size: 15px;
      }

      .todo-item.done span {
        text-decoration: line-through;
        color: #aaa;
      }

      .todo-item .delete {
        background: none;
        border: none;
        color: #ccc;
        font-size: 18px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 4px;
        transition: color 0.15s;
      }

      .todo-item .delete:hover { color: #b83f45; }

      /* Footer */
      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        font-size: 13px;
        color: #888;
        border-top: 1px solid #eee;
      }

      .filters {
        display: flex;
        gap: 4px;
      }

      .filters a {
        padding: 4px 10px;
        border-radius: 4px;
        text-decoration: none;
        color: #888;
        transition: all 0.15s;
      }

      .filters a:hover { color: #333; }
      .filters a.active {
        color: #b83f45;
        outline: 1px solid #b83f45;
      }

      .empty {
        padding: 32px 16px;
        text-align: center;
        color: #ccc;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
