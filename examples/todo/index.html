<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse Todo</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        justify-content: center;
        padding: 40px 16px;
        min-height: 100vh;
      }

      #app {
        width: 100%;
        max-width: 480px;
      }

      h1 {
        font-size: 2rem;
        font-weight: 300;
        text-align: center;
        margin-bottom: 24px;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .todo-app {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        overflow: hidden;
      }

      /* Add todo form */
      .add-todo {
        display: flex;
        border-bottom: 1px solid #334155;
      }

      .add-todo input {
        flex: 1;
        padding: 14px 16px;
        font-size: 16px;
        border: none;
        outline: none;
        background: transparent;
        color: #e2e8f0;
      }

      .add-todo input::placeholder { color: #475569; }

      .add-todo button {
        padding: 14px 20px;
        background: #60a5fa;
        color: #0f172a;
        border: none;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }

      .add-todo button:hover { background: #93c5fd; }

      /* Todo list */
      .todo-list {
        list-style: none;
      }

      .todo-item {
        display: flex;
        align-items: center;
        padding: 12px 16px;
        border-bottom: 1px solid #1e293b;
        transition: background 0.1s;
      }

      .todo-item:hover { background: #253347; }

      .todo-item input[type="checkbox"] {
        width: 20px;
        height: 20px;
        margin-right: 12px;
        cursor: pointer;
        accent-color: #60a5fa;
      }

      .todo-item span {
        flex: 1;
        font-size: 15px;
        color: #cbd5e1;
      }

      .todo-item.done span {
        text-decoration: line-through;
        color: #475569;
      }

      .todo-item .delete {
        background: none;
        border: none;
        color: #475569;
        font-size: 18px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 4px;
        transition: color 0.15s;
      }

      .todo-item .delete:hover { color: #f87171; }

      /* Footer */
      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        font-size: 13px;
        color: #64748b;
        border-top: 1px solid #334155;
      }

      .filters {
        display: flex;
        gap: 4px;
      }

      .filters a {
        padding: 4px 10px;
        border-radius: 4px;
        text-decoration: none;
        color: #64748b;
        transition: all 0.15s;
      }

      .filters a:hover { color: #e2e8f0; }
      .filters a.active {
        color: #60a5fa;
        outline: 1px solid #60a5fa;
      }

      .empty {
        padding: 32px 16px;
        text-align: center;
        color: #475569;
        font-size: 15px;
      }

      .devtools-toggle {
        display: block;
        margin: 16px auto 0;
        padding: 6px 14px;
        border: 1px solid #334155;
        border-radius: 6px;
        background: #1e293b;
        color: #60a5fa;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: border-color 0.15s;
      }

      .devtools-toggle:hover {
        border-color: #60a5fa;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/components/App.jsx"></script>
  </body>
</html>
